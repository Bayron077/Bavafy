<div class="page">

  <div class="card">

    <!-- Logo -->
    <div class="logo-wrap">
  <img src="assets/logo.png" alt="Bavafy Logo" class="logo-img" />
  <span class="logo-name">BAVAFY</span>
  <span class="logo-sub">tu música, tu mundo</span>
</div>

    <!-- Error message -->
    <div class="error-msg" *ngIf="errorMessage">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
      {{ errorMessage }}
    </div>

    <!-- Formulario -->
    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <div class="input-wrap">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
          <polyline points="22,6 12,13 2,6" />
        </svg>
        <input
          id="email"
          type="email"
          placeholder="tucorreo@ejemplo.com"
          [(ngModel)]="email"
          [class.input-error]="errorMessage && !email"
          autocomplete="email"
        />
      </div>
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <div class="input-wrap">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        <input
          id="password"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="••••••••"
          [(ngModel)]="password"
          [class.input-error]="errorMessage && !password"
          autocomplete="current-password"
        />
        <button class="toggle-pass" type="button" (click)="togglePassword()" aria-label="Mostrar contraseña">
          <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
            <line x1="1" y1="1" x2="23" y2="23" />
          </svg>
        </button>
      </div>
    </div>

    <div class="forgot-row">
      <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
    </div>

    <!-- Boton login -->
    <button
      class="btn-primary"
      [class.loading]="isLoading"
      [disabled]="isLoading"
      (click)="handleLogin()"
    >
      <span *ngIf="!isLoading">INICIAR SESIÓN</span>
      <span *ngIf="isLoading" class="spinner-wrap">
        <svg class="spinner" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
        </svg>
        Iniciando...
      </span>
    </button>

    <div class="register-row">
      ¿No tienes cuenta?
      <a routerLink="/register">Regístrate aquí</a>
    </div>

  </div>

</div>
