<div class="page">

  <div class="card">

    <!-- Logo -->
    <div class="logo-wrap">
      <img src="assets/logo.png" alt="Bavafy Logo" class="logo-img" />
      <span class="logo-name">BAVAFY</span>
      <span class="logo-sub">crea tu cuenta</span>
    </div>

    <!-- Error -->
    <div class="error-msg" *ngIf="errorMessage">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMessage }}
    </div>

    <!-- Exito -->
    <div class="success-msg" *ngIf="successMessage">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      {{ successMessage }}
    </div>

    <!-- Nombre -->
    <div class="form-group">
      <label for="name">Nombre completo</label>
      <div class="input-wrap">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <input
          id="name"
          type="text"
          placeholder="Tu nombre"
          [(ngModel)]="name"
          [class.input-error]="errorMessage && !name"
          autocomplete="name"
        />
      </div>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <div class="input-wrap">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <input
          id="email"
          type="email"
          placeholder="tucorreo@ejemplo.com"
          [(ngModel)]="email"
          [class.input-error]="errorMessage && !email"
          autocomplete="email"
        />
      </div>
    </div>

    <!-- Contraseña -->
    <div class="form-group">
      <label for="password">Contraseña</label>
      <div class="input-wrap">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input
          id="password"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Mínimo 6 caracteres"
          [(ngModel)]="password"
          [class.input-error]="errorMessage && !password"
          autocomplete="new-password"
        />
        <button class="toggle-pass" type="button" (click)="togglePassword()">
          <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>

      <!-- Indicador de fuerza de contraseña -->
      <div class="password-strength" *ngIf="password.length > 0">
        <div class="strength-bars">
          <div class="bar" [class.active-weak]="password.length >= 1"
               [class.active-medium]="password.length >= 6"
               [class.active-strong]="password.length >= 10"></div>
          <div class="bar" [class.active-medium]="password.length >= 6"
               [class.active-strong]="password.length >= 10"></div>
          <div class="bar" [class.active-strong]="password.length >= 10"></div>
        </div>
        <span class="strength-label"
          [class.weak]="password.length < 6"
          [class.medium]="password.length >= 6 && password.length < 10"
          [class.strong]="password.length >= 10">
          {{ password.length < 6 ? 'Débil' : password.length < 10 ? 'Media' : 'Fuerte' }}
        </span>
      </div>
    </div>

    <!-- Confirmar contraseña -->
    <div class="form-group">
      <label for="confirmPassword">Confirmar contraseña</label>
      <div class="input-wrap">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input
          id="confirmPassword"
          [type]="showConfirm ? 'text' : 'password'"
          placeholder="Repite tu contraseña"
          [(ngModel)]="confirmPassword"
          [class.input-error]="errorMessage && password !== confirmPassword"
          autocomplete="new-password"
        />
        <button class="toggle-pass" type="button" (click)="toggleConfirm()">
          <svg *ngIf="!showConfirm" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="showConfirm" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Boton -->
    <button
      class="btn-primary"
      [class.loading]="isLoading"
      [disabled]="isLoading"
      (click)="handleRegister()"
    >
      <span *ngIf="!isLoading">CREAR CUENTA</span>
      <span *ngIf="isLoading" class="spinner-wrap">
        <svg class="spinner" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
        </svg>
        Creando cuenta...
      </span>
    </button>

    <div class="login-row">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Inicia sesión</a>
    </div>

  </div>

</div>
