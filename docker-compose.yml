version: '3.9'

services:

  # ── Base de datos MySQL ──────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: bavafy_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: bavafy_db
    ports:
      - '3307:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./database/database.sql:/docker-entrypoint-initdb.d/database.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p12345678']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Node.js ──────────────────────────────────────────
  backend:
    build:
      context: ./bavaf_backend 
      dockerfile: Dockerfile
    container_name: bavafy_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: db           # nombre del servicio de mysql, no localhost
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 12345678
      DB_NAME: bavafy_db
      JWT_SECRET: supersecretkey123
      JWT_REFRESH_SECRET: supersecretkey123
      JWT_EXPIRES_IN: 24h
      SUPERUSER_EMAIL: super@admin.com
      SUPERUSER_PASSWORD: Super@1234
      NODE_ENV: production
    ports:
      - '3000:3000'
    volumes:
      - uploads_data:/app/uploads   # archivos de audio/covers/avatars persistentes

volumes:
  db_data:
  uploads_data: